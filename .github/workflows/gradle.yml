name: Java CI with Gradle

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

concurrency:
  group: "latest"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    permissions: write-all
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'zulu'
          java-package: 'jdk'

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle.properties', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Build
        run: ./gradlew build

      - name: Remove sources jar
        run: rm -f ./build/libs/*-sources.jar

      - name: Get version
        id: version
        run: |
          VERSION=$(grep 'mod_version' gradle.properties | cut -d'=' -f2)
          echo "mod_version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Publish Release
        if: github.event_name == 'push'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          VERSION="${{ steps.version.outputs.mod_version }}"
          gh release delete latest --cleanup-tag --yes 2>/dev/null || true
          cat > /tmp/release-notes.md <<-EOF
          **Latest Build**
          - Version: $VERSION
          - Minecraft: 1.21
          - Commit: ${{ github.sha }}
          EOF
          gh release create latest \
            --title "Latest Build ($VERSION)" \
            --notes-file /tmp/release-notes.md \
            --latest \
            ./build/libs/*.jar
