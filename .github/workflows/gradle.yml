name: build

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

concurrency:
  group: "latest"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    permissions: write-all
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'zulu'
          java-package: 'jdk'

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle.properties', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Build
        run: ./gradlew build

      - name: Remove sources jar
        run: rm -f ./build/libs/*-sources.jar

      - name: Download dependencies
        run: |
          mkdir -p ./build/bundle
          cp ./build/libs/*.jar ./build/bundle/

          FABRIC_VERSION="0.119.2+1.21.4"
          SATIN_VERSION="3.0.0-alpha.1"

          curl -sL -o ./build/bundle/fabric-api-$FABRIC_VERSION.jar \
            "https://maven.fabricmc.net/net/fabricmc/fabric-api/fabric-api/$FABRIC_VERSION/fabric-api-$FABRIC_VERSION.jar"

          curl -sL -o ./build/bundle/satin-$SATIN_VERSION.jar \
            "https://maven.ladysnake.org/releases/org/ladysnake/satin/$SATIN_VERSION/satin-$SATIN_VERSION.jar"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: thunderhack-reborn
          path: ./build/bundle/*.jar
          retention-days: 5

      - name: Get version
        id: version
        run: |
          VERSION=$(grep 'mod_version' gradle.properties | cut -d'=' -f2)
          echo "mod_version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Get commit details
        id: commit
        run: |
          echo "author=$(git log -1 --pretty=format:'%an')" >> "$GITHUB_OUTPUT"
          echo "date=$(git log -1 --pretty=format:'%ci' | cut -d' ' -f1)" >> "$GITHUB_OUTPUT"
          echo "sha_short=$(git log -1 --pretty=format:'%h')" >> "$GITHUB_OUTPUT"
          git log -1 --pretty=format:'%s' > /tmp/commit_subject.txt
          git log -1 --pretty=format:'%b' > /tmp/commit_body.txt

      - name: Compose release notes
        run: |
          VERSION="${{ steps.version.outputs.mod_version }}"

          cat > /tmp/release-notes.md <<-EOF
          # ThunderHack Reborn -- Latest Build

          | | |
          |---|---|
          | Version | \`$VERSION\` |
          | Minecraft | 1.21.4 |
          | Branch | ${{ github.ref_name }} |
          | Author | ${{ steps.commit.outputs.author }} |
          | Date | ${{ steps.commit.outputs.date }} |
          | Commit | [\`${{ steps.commit.outputs.sha_short }}\`](https://github.com/${{ github.repository }}/commit/${{ github.sha }}) |

          ---

          ## What's changed

          EOF

          echo "$(cat /tmp/commit_subject.txt)" >> /tmp/release-notes.md

          if [ -s /tmp/commit_body.txt ]; then
            echo "" >> /tmp/release-notes.md
            cat /tmp/commit_body.txt >> /tmp/release-notes.md
            echo "" >> /tmp/release-notes.md
          fi

          cat >> /tmp/release-notes.md <<-EOF
          ## Build info
          - Java: 21 (Zulu)
          - Fabric Loom: 1.9
          - Actions Run: #${{ github.run_number }}

          ## Included in this release
          - ThunderHack-Reborn jar
          - Fabric API 0.119.2+1.21.4
          - Satin 3.0.0-alpha.1 -- just drop all jars into mods/
          EOF

      - name: Publish Release
        if: github.event_name == 'push'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          VERSION="${{ steps.version.outputs.mod_version }}"

          if gh release view latest --json tagName --jq .tagName &>/dev/null; then
            gh release delete latest --cleanup-tag --yes
          fi

          gh release create latest \
            --title "Build $VERSION (${{ steps.commit.outputs.sha_short }})" \
            --notes-file /tmp/release-notes.md \
            --latest \
            ./build/bundle/*.jar
